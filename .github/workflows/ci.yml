name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Data-invariant guard
        run: npm run check:data

      - name: Unit tests
        run: npm test

      # SPA build (fast) proves the bundle compiles. The full SSG prerender + route-count
      # gate runs at deploy time via scripts/publish.sh.
      - name: Build
        run: npm run build:spa
